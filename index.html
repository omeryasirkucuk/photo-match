<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Match</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            text-align: center;
            padding: 20px;
            max-width: 520px;
            width: 100%;
        }

        h1 {
            font-size: 1.4rem;
            color: #e94560;
            text-shadow: 3px 3px 0 #0f3460;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.6rem;
            flex-wrap: wrap;
        }

        .stats span {
            color: #16c79a;
            text-shadow: 1px 1px 0 #000;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 450px;
            margin: 0 auto 20px;
            perspective: 800px;
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .card-front {
            background-color: #e94560;
            color: #fff;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 4px 4px 0 #000, inset -2px -2px 0 rgba(0,0,0,0.3), inset 2px 2px 0 rgba(255,255,255,0.2);
        }

        .card-back {
            background-color: #0f3460;
            transform: rotateY(180deg);
            box-shadow: 4px 4px 0 #000;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card.matched .card-back {
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 4px 4px 0 #000;
            border-color: #00ff00;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            padding: 12px 24px;
            background-color: #e94560;
            color: #fff;
            border: 4px solid #000;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 4px 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .combo-display {
            height: 30px;
            font-size: 0.7rem;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 4px;
        }

        .combo-display.show {
            animation: comboAnim 0.8s ease-out forwards;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay.active {
            display: flex;
        }

        .win-modal {
            background: #16213e;
            border: 6px solid #e94560;
            padding: 40px 30px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 8px 8px 0 #000;
            position: relative;
            overflow: hidden;
        }

        .win-modal h2 {
            color: #16c79a;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }

        .win-modal p {
            font-size: 0.55rem;
            margin-bottom: 16px;
            line-height: 2;
            color: #ccc;
        }

        .win-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        @keyframes bounce {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .card.bounce .card-inner {
            animation: bounce 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .card.shake {
            animation: shake 0.3s ease;
        }

        @keyframes comboAnim {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-80px) rotate(720deg); opacity: 0; }
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            animation: confetti 1s ease-out forwards;
        }

        .love-message {
            position: relative;
            height: 60px;
            margin-bottom: 10px;
        }

        .love-heart {
            position: absolute;
            font-size: 1.8rem;
            opacity: 0;
            animation: floatHeart 2s ease-in-out infinite;
        }

        .love-heart-1 { left: 10%; animation-delay: 0s; }
        .love-heart-2 { left: 30%; animation-delay: 0.4s; }
        .love-heart-3 { left: 50%; animation-delay: 0.8s; }
        .love-heart-4 { left: 70%; animation-delay: 1.2s; }
        .love-heart-5 { left: 85%; animation-delay: 1.6s; }

        @keyframes floatHeart {
            0% { transform: translateY(20px) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            60% { opacity: 1; }
            100% { transform: translateY(-40px) scale(1.3); opacity: 0; }
        }

        .love-title {
            font-size: 1.4rem;
            color: #ff6b9d;
            text-shadow: 2px 2px 0 #c0392b, 0 0 20px rgba(255,107,157,0.5);
            margin-bottom: 20px;
            animation: lovePulse 1.2s ease-in-out infinite alternate, loveGlow 2s ease-in-out infinite;
        }

        @keyframes lovePulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        @keyframes loveGlow {
            0%, 100% { text-shadow: 2px 2px 0 #c0392b, 0 0 20px rgba(255,107,157,0.3); }
            50% { text-shadow: 2px 2px 0 #c0392b, 0 0 40px rgba(255,107,157,0.8), 0 0 60px rgba(255,107,157,0.4); }
        }

        @media (max-width: 480px) {
            .game-container { padding: 12px; }
            h1 { font-size: 1rem; }
            .board { gap: 6px; }
            .card-front { font-size: 1.2rem; }
            .stats { font-size: 0.5rem; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>PHOTO<br>MATCH</h1>

        <!-- START SCREEN -->
        <div id="startScreen" class="screen">
            <button class="btn" id="startBtn">OYUNU BASLAT</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="screen" style="display:none;">
            <div class="stats">
                <div>HAMLE: <span id="moves">0</span></div>
                <div>ESLESME: <span id="pairs">0/8</span></div>
                <div>SURE: <span id="timer">00:00</span></div>
            </div>
            <div id="comboDisplay" class="combo-display"></div>
            <div class="board" id="board"></div>
            <button class="btn" id="menuBtn">MENU</button>
        </div>
    </div>

    <!-- WIN OVERLAY -->
    <div class="overlay" id="overlay">
        <div class="win-modal">
            <div class="love-message">
                <span class="love-heart love-heart-1">❤️</span>
                <span class="love-heart love-heart-2">💕</span>
                <span class="love-heart love-heart-3">❤️</span>
                <span class="love-heart love-heart-4">💖</span>
                <span class="love-heart love-heart-5">💗</span>
            </div>
            <h2 class="love-title">omer loves esra</h2>
            <p id="winText"></p>
            <div class="win-buttons">
                <button class="btn" id="playAgainBtn">TEKRAR OYNA</button>
                <button class="btn" id="winMenuBtn">MENU</button>
            </div>
        </div>
    </div>

    <script>
        const IMAGES = [
            'src/img/1.png',
            'src/img/2.png',
            'src/img/3.png',
            'src/img/4.png',
            'src/img/5.png',
            'src/img/6.png',
            'src/img/7.png',
            'src/img/8.png'
        ];

        const TOTAL_PAIRS = 8;

        let cards = [];
        let flippedCards = [];
        let moves = 0;
        let matchedPairs = 0;
        let isLocked = false;
        let timerInterval = null;
        let elapsedSeconds = 0;
        let timerStarted = false;
        let comboCount = 0;
        let audioCtx = null;

        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const board = document.getElementById('board');
        const movesEl = document.getElementById('moves');
        const pairsEl = document.getElementById('pairs');
        const timerEl = document.getElementById('timer');
        const comboDisplay = document.getElementById('comboDisplay');
        const overlay = document.getElementById('overlay');
        const winText = document.getElementById('winText');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function formatTime(secs) {
            const m = String(Math.floor(secs / 60)).padStart(2, '0');
            const s = String(secs % 60).padStart(2, '0');
            return m + ':' + s;
        }

        function showScreen(screen) {
            startScreen.style.display = 'none';
            gameScreen.style.display = 'none';
            if (screen === 'start') startScreen.style.display = '';
            if (screen === 'game') gameScreen.style.display = '';
        }

        function goToMenu() {
            clearInterval(timerInterval);
            timerInterval = null;
            overlay.classList.remove('active');
            showScreen('start');
        }

        function startGame() {
            const pairList = IMAGES.flatMap(img => [img, img]);
            shuffle(pairList);

            cards = pairList.map((img, i) => ({
                id: i, img, isFlipped: false, isMatched: false
            }));

            flippedCards = [];
            moves = 0;
            matchedPairs = 0;
            isLocked = false;
            comboCount = 0;
            elapsedSeconds = 0;
            timerStarted = false;
            clearInterval(timerInterval);
            timerInterval = null;

            updateStats();
            renderBoard();
            showScreen('game');
        }

        function renderBoard() {
            board.innerHTML = '';
            cards.forEach(card => {
                const el = document.createElement('div');
                el.className = 'card';
                el.dataset.id = card.id;
                el.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back"><img src="${card.img}" alt="card"></div>
                    </div>
                `;
                el.addEventListener('click', handleCardClick);
                board.appendChild(el);
            });
        }

        function handleCardClick(e) {
            const el = e.currentTarget;
            const id = parseInt(el.dataset.id);
            const card = cards[id];

            if (isLocked || card.isFlipped || card.isMatched || flippedCards.length >= 2) return;

            if (!timerStarted) {
                timerStarted = true;
                startTimer();
            }

            initAudio();
            playSound('flip');

            card.isFlipped = true;
            el.classList.add('flipped');
            flippedCards.push({ card, el });

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkForMatch();
            }
        }

        function checkForMatch() {
            const [first, second] = flippedCards;

            if (first.card.img === second.card.img) {
                first.card.isMatched = true;
                second.card.isMatched = true;
                first.el.classList.add('matched');
                second.el.classList.add('matched');
                matchedPairs++;
                comboCount++;

                playSound('match');
                if (comboCount >= 2) showCombo(comboCount);

                first.el.classList.add('bounce');
                second.el.classList.add('bounce');

                updateStats();
                flippedCards = [];

                if (matchedPairs === TOTAL_PAIRS) {
                    clearInterval(timerInterval);
                    playSound('win');
                    setTimeout(showWinScreen, 600);
                }
            } else {
                isLocked = true;
                comboCount = 0;
                playSound('mismatch');
                first.el.classList.add('shake');
                second.el.classList.add('shake');

                setTimeout(() => {
                    first.card.isFlipped = false;
                    second.card.isFlipped = false;
                    first.el.classList.remove('flipped', 'shake');
                    second.el.classList.remove('flipped', 'shake');
                    flippedCards = [];
                    isLocked = false;
                }, 900);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                timerEl.textContent = formatTime(elapsedSeconds);
            }, 1000);
        }

        function updateStats() {
            movesEl.textContent = moves;
            pairsEl.textContent = matchedPairs + '/' + TOTAL_PAIRS;
            timerEl.textContent = formatTime(elapsedSeconds);
        }

        function showCombo(count) {
            comboDisplay.textContent = 'COMBO x' + count + '!';
            comboDisplay.classList.remove('show');
            void comboDisplay.offsetWidth;
            comboDisplay.classList.add('show');
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            if (type === 'flip') {
                playTone(800, 'square', 0.05, 0.08, now);
            } else if (type === 'match') {
                playTone(523, 'sine', 0.1, 0.12, now);
                playTone(659, 'sine', 0.1, 0.12, now + 0.1);
            } else if (type === 'mismatch') {
                playTone(200, 'sawtooth', 0.08, 0.15, now);
            } else if (type === 'win') {
                playTone(523, 'sine', 0.1, 0.15, now);
                playTone(659, 'sine', 0.1, 0.15, now + 0.15);
                playTone(784, 'sine', 0.1, 0.15, now + 0.3);
                playTone(1047, 'sine', 0.12, 0.25, now + 0.45);
            }
        }

        function playTone(freq, waveType, volume, duration, startTime) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = waveType;
            osc.frequency.value = freq;
            gain.gain.value = volume;
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function showWinScreen() {
            const score = moves + elapsedSeconds;
            winText.innerHTML = 'HAMLE: ' + moves + ' | SURE: ' + formatTime(elapsedSeconds) + ' | SKOR: ' + score;
            spawnConfetti();
            overlay.classList.add('active');
        }

        function spawnConfetti() {
            const modal = document.querySelector('#overlay .win-modal');
            const colors = ['#e94560', '#16c79a', '#ffcc00', '#0f3460', '#00ff00'];
            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.top = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[i % colors.length];
                piece.style.animationDelay = Math.random() * 0.5 + 's';
                piece.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
                modal.appendChild(piece);
                setTimeout(() => piece.remove(), 2000);
            }
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', goToMenu);
        document.getElementById('winMenuBtn').addEventListener('click', goToMenu);
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            overlay.classList.remove('active');
            startGame();
        });

        showScreen('start');
    </script>
</body>
</html>
